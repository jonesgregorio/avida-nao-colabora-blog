name: Deploy Supabase Edge Functions

on:
  push:
    branches: [main]
    paths:
      - 'kind-lucid-clarke/mnt/outputs/avida-nao-colabora-blog/supabase/functions/**'
      - 'kind-lucid-clarke/mnt/outputs/avida-nao-colabora-blog/supabase/config.toml'
      - '.github/workflows/deploy-supabase-functions.yml'
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: kind-lucid-clarke/mnt/outputs/avida-nao-colabora-blog
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Deploy all Edge Functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase functions deploy --project-ref lejvvhzluggyxlfwfoxl
