<!-- Post de feed do Instagram — 1080×1080, FUNDO BRANCO, com a logo completa.
     Diferente da foto de perfil, o feed NÃO tem corte circular e é visto grande:
     aqui o nome cabe e fica legível.

     Mantido o lockup HORIZONTAL original (ícone à esquerda, nome à direita).
     Empilhar em duas linhas mudaria o alinhamento e a quebra da logo — os paths,
     a fonte, as cores e as proporções são as mesmas de src/components/Logo.tsx.

     Enquadramento: a logo (viewBox 225×32) é escalada 3.4× → 765×108.8 (~71% da
     largura) e centrada. stroke-width e font-size acompanham a escala, então a
     espessura do traço e o peso do texto ficam proporcionais ao original. -->
