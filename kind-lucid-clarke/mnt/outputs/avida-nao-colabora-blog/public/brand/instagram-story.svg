<!-- Story do Instagram — 1080×1920, FUNDO BRANCO, com a logo completa.
     Mesmo lockup horizontal do feed, apenas recentrado no formato vertical.

     Enquadramento: a logo (viewBox 225×32) é escalada 3.4× → 765×108.8 e
     centrada em 1080×1920. Fica bem dentro da área segura do Story: o Instagram
     cobre ~250px no topo (perfil/tempo) e ~250px embaixo (responder/enviar), e
     a logo ocupa a faixa central, entre y≈906 e y≈1015.

     Paths, fonte, cores e proporções idênticos a src/components/Logo.tsx. -->
