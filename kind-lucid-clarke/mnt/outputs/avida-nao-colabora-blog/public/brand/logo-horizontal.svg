<!-- Logo horizontal "A Vida Não Colabora" — versão para fundo claro.
     Reprodução fiel do componente src/components/Logo.tsx, com valores MEDIDOS
     na logo renderizada em produção (não deduzidos):
       ícone .... 32px, #123528 (forest-800), paths idênticos ao LogoIcon
       gap ...... 10px (gap-2.5)
       texto .... Playfair Display, peso 400, 20px, #1A4A3A (forest-900),
                  letter-spacing normal — largura medida: 182.92px
     Total: 32 + 10 + 182.92 ≈ 225 × 32.

     ATENÇÃO: o texto aqui é <text>, então depende da fonte Playfair Display
     estar disponível em quem abrir o arquivo. Para uso fora do site (redes,
     e-mail, terceiros), prefira os PNGs — eles já vêm rasterizados com a fonte
     correta. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 225 32" width="225" height="32" fill="none">
  <g>
    <path
      d="M16 25.5C16 25.5 6 19 6 12.4C6 9.1 8.5 6.6 11.6 6.6C13.6 6.6 15.2 7.7 16 9.2C16.8 7.7 18.4 6.6 20.4 6.6C23.5 6.6 26 9.1 26 12.4C26 19 16 25.5 16 25.5Z"
      stroke="#123528" stroke-width="1.9" stroke-linejoin="round"
    />
    <path d="M16 21C16 17.7 17.6 15.2 20.4 14.3" stroke="#123528" stroke-width="1.7" stroke-linecap="round" />
    <path d="M21 14C19.3 14.6 18 16 17.5 17.8C19.3 17.2 20.6 15.8 21 14Z" fill="#123528" />
  </g>
  <text
